name: Edge Bot Pro Automático

on:
  schedule:
    # Se ejecuta todos los días a las 14:00 UTC (Aprox 08:00 AM hora de CDMX)
    - cron: '0 14 * * *' 
  workflow_dispatch: # Este comando es clave: te permite darle a un botón de "Run workflow" manualmente en GitHub cuando quieras

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar archivo de aprendizaje (Regla 4)
        run: python data/aprendizaje.py

      - name: Ejecutar Edge Bot Pro e Inferencia IA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
