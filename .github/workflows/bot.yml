name: "Edge Bot Pro Automatico"

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch:

permissions:
  contents: write # Permiso vital para guardar la memoria

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Analizar resultados pasados y Entrenar
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        # Este script ahora debe conectarse a Groq, analizar aciertos/errores y guardar el historial
        run: python data/aprendizaje.py

      - name: Ejecutar Edge Bot Pro (Nuevas predicciones)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Guardar memoria permanente en el repositorio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Aprendizaje: Historial de predicciones ganadoras y perdedoras actualizado"
          # El asterisco asegura que guarde CUALQUIER archivo modificado en la carpeta data (ej. historial.json, procesados.txt)
          file_pattern: "data/*" 
